name: 构建和发布 NFS 离线安装包

# ── 说明 ──────────────────────────────────────────────────────────────────────
# 本工作流构建 nfs-common 的完全离线安装包（Ubuntu/Debian 系，dpkg 安装）。
# cloud、controller、edge、worker 节点挂载 NFS 类型的 PVC 时都需要 nfs-common。
#
# 产物:
#   nfs-offline-amd64-<tag>.tar.gz
#   nfs-offline-arm64-<tag>.tar.gz
#
# 包内结构:
#   debs/          ← nfs-common 及全部依赖的 .deb 文件
#   install-nfs.sh ← 一键安装脚本（离线优先，在线回退）
#   README.txt
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'nfs-v*'
  workflow_dispatch:
    inputs:
      ubuntu_version:
        description: '目标系统版本（Ubuntu）'
        required: false
        default: '22.04'

permissions:
  contents: write

env:
  UBUNTU_VERSION: '22.04'

jobs:
  build-nfs:
    runs-on: ubuntu-latest
    name: 构建 NFS 离线包 (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            docker_platform: linux/amd64
          - arch: arm64
            docker_platform: linux/arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（arm64 跨架构 deb 下载必需）
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.docker_platform }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 设置环境变量
        id: set_env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="manual-nfs-${GITHUB_SHA::7}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
          fi
          PACKAGE_NAME="nfs-offline-${{ matrix.arch }}-${TAG_VERSION}.tar.gz"
          echo "TAG_VERSION=${TAG_VERSION}"     >> $GITHUB_ENV
          echo "PACKAGE_NAME=${PACKAGE_NAME}"   >> $GITHUB_ENV
          echo "tag_version=${TAG_VERSION}"     >> $GITHUB_OUTPUT
          echo "package_name=${PACKAGE_NAME}"   >> $GITHUB_OUTPUT

      # ── 在干净的 Ubuntu 容器内下载 nfs-common 及全部依赖 deb ──────────────
      - name: 下载 nfs-common 离线 deb 包（${{ matrix.arch }}）
        run: |
          set -euo pipefail
          mkdir -p debs

          echo "=== 在 Ubuntu ${UBUNTU_VERSION} (${{ matrix.arch }}) 容器中下载 nfs-common 及依赖 ==="
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -v "$(pwd)/debs:/debs" \
            ubuntu:${UBUNTU_VERSION} \
            bash -c "
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              # --download-only 只下载不安装，确保拿到全部依赖
              apt-get install -y --download-only --no-install-recommends \
                nfs-common rpcbind keyutils libnfsidmap2 libtirpc3 \
                libgssglue1 libevent-2.1-7 2>/dev/null || \
              apt-get install -y --download-only --no-install-recommends \
                nfs-common 2>/dev/null
              find /var/cache/apt/archives -maxdepth 1 -name '*.deb' \
                -exec cp {} /debs/ \;
              echo \"已下载 \$(ls /debs/*.deb 2>/dev/null | wc -l) 个 .deb 文件\"
            "

          echo "✓ nfs-common 离线包下载完成:"
          ls -lh debs/

      # ── 创建一键安装脚本 ────────────────────────────────────────────────────
      - name: 创建 install-nfs.sh
        run: |
          cat > install-nfs.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          # NFS 离线安装脚本（Ubuntu/Debian）
          # 用法: sudo bash install-nfs.sh
          
          [[ $EUID -ne 0 ]] && { echo "错误：请使用 root 权限运行: sudo bash install-nfs.sh"; exit 1; }
          
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          DEB_DIR="${SCRIPT_DIR}/debs"
          
          RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[1;33m'; NC='\033[0m'
          info()    { echo -e "\033[0;34m[INFO]\033[0m  $*"; }
          success() { echo -e "${GREEN}[OK]\033[0m    $*"; }
          warn()    { echo -e "${YELLOW}[WARN]\033[0m  $*"; }
          error()   { echo -e "${RED}[ERROR]\033[0m $*" >&2; exit 1; }
          
          # 检查是否已安装
          if dpkg -l nfs-common 2>/dev/null | grep -q "^ii"; then
            VER=$(dpkg -l nfs-common | awk '/^ii/{print $3}')
            success "nfs-common 已安装: ${VER}"
            exit 0
          fi
          
          info "安装 nfs-common..."
          
          # 优先离线安装
          if [ -d "$DEB_DIR" ] && ls "$DEB_DIR"/*.deb &>/dev/null 2>&1; then
            info "使用离线 deb 包安装（共 $(ls "$DEB_DIR"/*.deb | wc -l) 个包）..."
            dpkg -i --force-depends "$DEB_DIR"/*.deb 2>/dev/null || true
            apt-get install -f -y -qq 2>/dev/null || true
            if dpkg -l nfs-common 2>/dev/null | grep -q "^ii"; then
              success "nfs-common 离线安装成功: $(dpkg -l nfs-common | awk '/^ii/{print $3}')"
              exit 0
            fi
            warn "离线安装未完全成功，尝试在线安装..."
          fi
          
          # 在线回退
          info "通过 apt-get 在线安装 nfs-common..."
          apt-get update -qq && apt-get install -y --no-install-recommends nfs-common
          dpkg -l nfs-common 2>/dev/null | grep -q "^ii" \
            && success "nfs-common 在线安装成功: $(dpkg -l nfs-common | awk '/^ii/{print $3}')" \
            || error "nfs-common 安装失败，请检查网络或手动安装"
          SCRIPT
          chmod +x install-nfs.sh
          echo "✓ install-nfs.sh 已生成"

      # ── 生成说明文件 ────────────────────────────────────────────────────────
      - name: 生成说明文件
        run: |
          cat > README.txt << EOF
          NFS 离线安装包 (${{ matrix.arch }})
          ====================================
          适用系统 : Ubuntu ${UBUNTU_VERSION} / Debian 11+（dpkg/apt 系）
          架构     : ${{ matrix.arch }}
          构建时间 : $(date -u +%Y-%m-%dT%H:%M:%SZ)
          版本标签 : ${TAG_VERSION}
          
          用途:
            K8s 集群的 cloud/controller/worker/edge 节点在挂载 NFS 类型的 PVC
            时需要安装 nfs-common，否则无法读取 NFS 文件。
          
          使用方法:
            tar -xzf ${PACKAGE_NAME}
            sudo bash install-nfs.sh
          
          说明:
            - 优先使用 debs/ 目录内的离线 deb 包安装（无需联网）
            - 若离线安装失败则自动回退到 apt-get 在线安装
          
          验证安装:
            dpkg -l nfs-common
            mount.nfs --version
          EOF
          echo "✓ README.txt 已生成"

      # ── 打包并生成校验和 ────────────────────────────────────────────────────
      - name: 打包
        run: |
          set -euo pipefail
          TEMP_DIR="$(mktemp -d)"
          trap "rm -rf $TEMP_DIR" EXIT

          mkdir -p "$TEMP_DIR/debs"
          cp -r debs/*.deb "$TEMP_DIR/debs/" 2>/dev/null || true
          cp install-nfs.sh "$TEMP_DIR/"
          cp README.txt "$TEMP_DIR/"

          tar -czf "${PACKAGE_NAME}" -C "$TEMP_DIR" .
          sha256sum "${PACKAGE_NAME}" > "${PACKAGE_NAME}.sha256sum.txt"

          echo "✓ 打包完成: ${PACKAGE_NAME} ($(du -h ${PACKAGE_NAME} | cut -f1))"
          echo "  SHA256: $(cat ${PACKAGE_NAME}.sha256sum.txt)"
          echo "  包含 deb: $(ls debs/*.deb 2>/dev/null | wc -l) 个"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nfs-${{ matrix.arch }}
          path: |
            ${{ env.PACKAGE_NAME }}
            ${{ env.PACKAGE_NAME }}.sha256sum.txt
          retention-days: 1

  # ── 发布 Release ─────────────────────────────────────────────────────────────
  # 注意: build-nfs 是 matrix job，matrix job 的 outputs 无法直接传递给下游 job。
  # 因此在 release job 内独立重新计算 TAG_VERSION，保证与构建阶段逻辑一致。
  release:
    runs-on: ubuntu-latest
    name: 发布到 GitHub Release
    needs: build-nfs

    steps:
      # 独立计算 tag（不依赖 matrix job outputs）
      - name: 计算发布 Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_version=manual-nfs-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          else
            echo "tag_version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-files/

      - name: 整理并发布
        run: |
          mkdir -p dist
          find release-files/ -type f -exec cp {} dist/ \;
          ls -lh dist/

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag_version }}
          name: "NFS 离线包 ${{ steps.tag.outputs.tag_version }}"
          body: |
            ## NFS 离线安装包

            适用于 cloud / controller / worker / edge 节点，用于支持 NFS 类型 PVC 挂载。

            ### 下载
            | 架构 | 文件 |
            |------|------|
            | amd64 | `nfs-offline-amd64-*.tar.gz` |
            | arm64 | `nfs-offline-arm64-*.tar.gz` |

            ### 使用方法
            ```bash
            tar -xzf nfs-offline-<arch>-<tag>.tar.gz
            sudo bash install-nfs.sh
            ```

            ### 说明
            - 包含 `nfs-common` 及全部依赖的 `.deb` 包（无需联网）
            - 安装脚本自动处理依赖，失败时回退到在线 `apt-get`
            - 适用于 Ubuntu 22.04 / Debian 11+（dpkg 系）
          files: dist/*
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
