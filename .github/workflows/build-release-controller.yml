name: 构建和发布 K3s 控制节点离线包（HA 扩容）

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'controller/**'
      - '.github/workflows/build-release-controller.yml'
  workflow_dispatch:
    # 手动触发时默认使用提交短 hash 作为发布标识

permissions:
  contents: write
  packages: write

jobs:
  build-controller:
    runs-on: ubuntu-latest
    name: 构建并发布 K3s 控制节点离线包 (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            dockerfile_platform: linux/amd64
          - arch: arm64
            dockerfile_platform: linux/arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU 支持
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.dockerfile_platform }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 设置环境变量
        id: set_env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="manual-controller-${GITHUB_SHA::7}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
            if [ -z "$TAG_VERSION" ]; then
              echo "error: 未能解析到 tag，请使用 tag 触发或手动触发" >&2
              exit 1
            fi
          fi
          echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_ENV
          echo "tag_version=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV

          # 版本号（与云端保持一致）
          echo "K3S_VERSION=v1.34.2+k3s1" >> $GITHUB_ENV
          echo "HELM_VERSION=v3.19.2"      >> $GITHUB_ENV
          echo "EDGEMESH_VERSION=v1.17.0"  >> $GITHUB_ENV

      - name: 构建 K3s 控制节点离线包
        run: |
          set -euo pipefail

          echo "=== 构建 K3s 控制节点离线包 (架构: ${{ matrix.arch }}) ==="
          echo "版本信息: K3s ${K3S_VERSION}"

          # 1. 下载 k3s 二进制文件
          echo "[1/3] 下载 k3s 二进制文件..."
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            K3S_DOWNLOAD_URL="https://github.com/k3s-io/k3s/releases/download/${K3S_VERSION}/k3s"
          else
            K3S_DOWNLOAD_URL="https://github.com/k3s-io/k3s/releases/download/${K3S_VERSION}/k3s-arm64"
          fi
          wget -q --show-progress -O "k3s-${{ matrix.arch }}" "$K3S_DOWNLOAD_URL" \
            || (echo "❌ 错误：无法下载 k3s ${{ matrix.arch }}" && exit 1)
          chmod +x "k3s-${{ matrix.arch }}"
          echo "✓ k3s 下载完成"

          # 2. 下载 K3s 系统镜像
          # 控制节点默认可调度（无 NoSchedule 污点），系统 Pod（CoreDNS、Traefik 等）
          # 可能被调度到此节点，离线环境需预载镜像
          echo "[2/3] 下载 K3s 系统镜像..."
          mkdir -p images

          K3S_IMAGES=(
            "docker.io/rancher/klipper-helm:v0.9.10-build20251111"
            "docker.io/rancher/klipper-lb:v0.4.13"
            "docker.io/rancher/local-path-provisioner:v0.0.32"
            "docker.io/rancher/mirrored-coredns-coredns:1.13.1"
            "docker.io/rancher/mirrored-library-busybox:1.36.1"
            "docker.io/rancher/mirrored-library-traefik:3.5.1"
            "docker.io/rancher/mirrored-metrics-server:v0.8.0"
            "docker.io/rancher/mirrored-pause:3.6"
          )

          for image in "${K3S_IMAGES[@]}"; do
            echo "  拉取镜像: $image"
            docker pull --platform ${{ matrix.dockerfile_platform }} "$image" \
              || (echo "❌ 错误：无法拉取镜像 $image" && exit 1)
            filename=$(echo "$image" | sed 's/[\/:]/-/g')
            docker save "$image" -o "images/${filename}.tar" \
              || (echo "❌ 错误：无法保存镜像 $image" && exit 1)
          done
          echo "✓ K3s 系统镜像处理完成"

          # 3. 下载 Helm + Helm Charts + nfs-common 离线包
          echo "[2.5/3] 下载 Helm 二进制文件..."
          HELM_TAR="helm-${HELM_VERSION}-linux-${{ matrix.arch }}.tar.gz"
          wget -q -O helm.tar.gz "https://get.helm.sh/${HELM_TAR}" \
            || (echo "❌ 错误：无法下载 Helm" && exit 1)
          tar -xzf helm.tar.gz
          mv linux-${{ matrix.arch }}/helm ./helm
          chmod +x ./helm
          rm -rf linux-${{ matrix.arch }} helm.tar.gz
          echo "✓ Helm 下载完成 (${HELM_VERSION})"

          echo "[2.6/3] 下载 EdgeMesh Helm Chart..."
          mkdir -p helm-charts
          wget -q -O helm-charts/edgemesh.tgz \
            "https://raw.githubusercontent.com/kubeedge/edgemesh/main/build/helm/edgemesh.tgz" \
            || echo "⚠️  EdgeMesh chart 下载失败，跳过"



          # 3. 准备脚本并打包
          echo "[3/3] 准备脚本并打包..."
          INSTALL_DIR="${GITHUB_WORKSPACE}/controller/install"
          INSTALL_SCRIPT="$INSTALL_DIR/install.sh"
          CLEANUP_SCRIPT="$INSTALL_DIR/cleanup.sh"

          if [ ! -f "$INSTALL_SCRIPT" ]; then
            echo "❌ 错误：找不到安装脚本 $INSTALL_SCRIPT"
            ls -la "$INSTALL_DIR" 2>/dev/null || echo "controller/install 目录不存在"
            exit 1
          fi
          echo "✓ 安装脚本就绪"

          mkdir -p meta
          cat > meta/version.txt << EOFMETA
          k3s_version=${K3S_VERSION}
          arch=${{ matrix.arch }}
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          tag=${TAG_VERSION}
          role=controller
          EOFMETA
          echo "✓ 元数据已创建"

          PACKAGE_NAME="k3s-controller-${K3S_VERSION}-${{ matrix.arch }}-${TAG_VERSION}.tar.gz"
          TEMP_PKG_DIR="$(mktemp -d)"
          trap "rm -rf $TEMP_PKG_DIR" EXIT

          cp "k3s-${{ matrix.arch }}" "$TEMP_PKG_DIR/"
          cp -r images "$TEMP_PKG_DIR/"
          cp -r meta "$TEMP_PKG_DIR/"
          cp "$INSTALL_SCRIPT" "$TEMP_PKG_DIR/"
          if [ -f "$CLEANUP_SCRIPT" ]; then
            cp "$CLEANUP_SCRIPT" "$TEMP_PKG_DIR/"
            echo "✓ 已包含 cleanup.sh 清理脚本"
          fi

          # 复制 Helm 二进制文件
          if [ -f helm ]; then
            cp helm "$TEMP_PKG_DIR/"
            echo "✓ 已包含 Helm 二进制文件"
          fi

          # 复制 EdgeMesh Helm chart
          if [ -d helm-charts ] && ls helm-charts/*.tgz &>/dev/null 2>&1; then
            cp -r helm-charts "$TEMP_PKG_DIR/"
            echo "✓ 已包含 Helm Charts"
          fi



          cat > "$TEMP_PKG_DIR/README.txt" << EOFREADME
          K3s 额外控制节点离线安装包（HA 高可用扩容）
          ==========================================

          版本信息:
            K3s:        ${K3S_VERSION}
            架构:       ${{ matrix.arch }}
            构建时间:   $(date -u +%Y-%m-%dT%H:%M:%SZ)

          适用场景:
            在已有 K3s 集群基础上，扩容为多控制节点 HA 高可用集群。
            第一个控制节点须已由 cloud 安装包部署（--cluster-init 模式）。

          前提条件:
            1. 第一个控制节点已正常运行（cloud 安装包，已启用 --cluster-init）
            2. 本节点与第一个控制节点以下端口互通:
               - 6443  (K8s API Server)
               - 2379  (etcd client)
               - 2380  (etcd peer)
            3. 准备好第一个控制节点的 token:
               cat /var/lib/rancher/k3s/server/token

          使用方法:
            sudo ./install.sh <first-server-ip:port> <node-token> <this-node-ip> [node-name]

          示例:
            sudo ./install.sh 192.168.1.10:6443 K10xxx...::server:xxx 192.168.1.11 cloudedge-controller-02

          参数说明:
            first-server-ip:port  第一个控制节点地址（端口默认 6443）
            node-token            控制节点 token（来自第一个节点 /var/lib/rancher/k3s/server/token）
            this-node-ip          本节点对外 IP（用于 advertise-address 和 tls-san）
            node-name             本节点名称（可选，默认 k3s-controller-<hostname>）

          注意事项:
            - HA 集群建议部署奇数个控制节点（3 或 5 个）以保证 etcd quorum
            - 控制节点加入后，K3s 自动赋予 control-plane 角色，无需手动打标签
            - 此包不安装 KubeEdge CloudCore（CloudCore 已在第一个控制节点部署）

          清理/退出集群:
            重要：必须先在其他控制节点执行 kubectl drain 和 kubectl delete node，
            再在本节点运行 cleanup.sh，避免破坏 etcd quorum！
            sudo ./cleanup.sh

          验证:
            在任意控制节点执行: kubectl get nodes

          详细文档: https://docs.k3s.io/datastore/ha-embedded
          EOFREADME

          tar -czf "$PACKAGE_NAME" -C "$TEMP_PKG_DIR" .
          echo "✓ 包已创建: $PACKAGE_NAME"
          echo "包大小: $(du -h "$PACKAGE_NAME" | cut -f1)"

      - name: 生成校验和并准备发布文件
        run: |
          PACKAGE_NAME="k3s-controller-${K3S_VERSION}-${{ matrix.arch }}-${TAG_VERSION}.tar.gz"
          sha256sum "$PACKAGE_NAME" > "${PACKAGE_NAME}.sha256sum.txt"

          mkdir -p "${GITHUB_WORKSPACE}/release-${{ matrix.arch }}"
          cp "$PACKAGE_NAME" "${GITHUB_WORKSPACE}/release-${{ matrix.arch }}/"
          cp "${PACKAGE_NAME}.sha256sum.txt" "${GITHUB_WORKSPACE}/release-${{ matrix.arch }}/"

          echo "=== 准备发布的文件 (${{ matrix.arch }}) ==="
          ls -lh "${GITHUB_WORKSPACE}/release-${{ matrix.arch }}/"

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.set_env.outputs.tag_version }}
          files: release-${{ matrix.arch }}/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
