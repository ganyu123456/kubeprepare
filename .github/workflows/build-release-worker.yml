name: 构建和发布 K3s Worker 节点离线包

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'worker/**'
      - '.github/workflows/build-release-worker.yml'
  workflow_dispatch:
    # 手动触发时默认使用提交短 hash 作为发布标识

permissions:
  contents: write
  packages: write

jobs:
  build-worker:
    runs-on: ubuntu-latest
    name: 构建并发布 K3s Worker 离线包 (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            dockerfile_platform: linux/amd64
          - arch: arm64
            dockerfile_platform: linux/arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（arm64 跨架构 deb 下载必需）
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.dockerfile_platform }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 设置环境变量
        id: set_env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="manual-worker-${GITHUB_SHA::7}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
            if [ -z "$TAG_VERSION" ]; then
              echo "error: 未能解析到 tag，请使用 tag 触发或手动触发" >&2
              exit 1
            fi
          fi
          echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_ENV
          echo "tag_version=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV

          # 版本号（与云端保持一致）
          echo "K3S_VERSION=v1.34.2+k3s1" >> $GITHUB_ENV
          echo "HELM_VERSION=v3.19.2"      >> $GITHUB_ENV
          echo "EDGEMESH_VERSION=v1.17.0"  >> $GITHUB_ENV

      - name: 构建 K3s Worker 离线包
        run: |
          set -euo pipefail

          echo "=== 构建 K3s Worker 离线包 (架构: ${{ matrix.arch }}) ==="
          echo "版本信息: K3s ${K3S_VERSION}"

          # 1. 下载 k3s 二进制文件
          echo "[1/4] 下载 k3s 二进制文件..."
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            K3S_DOWNLOAD_URL="https://github.com/k3s-io/k3s/releases/download/${K3S_VERSION}/k3s"
          else
            K3S_DOWNLOAD_URL="https://github.com/k3s-io/k3s/releases/download/${K3S_VERSION}/k3s-arm64"
          fi
          wget -q --show-progress -O "k3s-${{ matrix.arch }}" "$K3S_DOWNLOAD_URL" \
            || (echo "❌ 错误：无法下载 k3s ${{ matrix.arch }}" && exit 1)
          chmod +x "k3s-${{ matrix.arch }}"
          echo "✓ k3s 下载完成"

          # 2. 下载 K3s 系统镜像
          echo "[2/4] 下载 K3s 系统镜像..."
          mkdir -p images
          K3S_IMAGES=(
            "docker.io/rancher/klipper-lb:v0.4.13"
            "docker.io/kubeedge/iptables-manager:v1.22.0"
            "docker.io/kubeedge/edgemesh-agent:v1.17.0"
          )
          for image in "${K3S_IMAGES[@]}"; do
            echo "  拉取镜像: $image"
            docker pull --platform ${{ matrix.dockerfile_platform }} "$image" \
              || (echo "❌ 错误：无法拉取镜像 $image" && exit 1)
            filename=$(echo "$image" | sed 's/[\\/:]/-/g')
            docker save "$image" -o "images/${filename}.tar" \
              || (echo "❌ 错误：无法保存镜像 $image" && exit 1)
          done
          echo "✓ K3s 系统镜像处理完成"

          # 3. 下载其他依赖
          echo "[3/4] 下载其他依赖（Helm、Chart、NFS）..."
          # 下载 Helm
          HELM_TAR="helm-${HELM_VERSION}-linux-${{ matrix.arch }}.tar.gz"
          wget -q -O helm.tar.gz "https://get.helm.sh/${HELM_TAR}" || (echo "❌ 错误：无法下载 Helm" && exit 1)
          tar -xzf helm.tar.gz && mv linux-${{ matrix.arch }}/helm ./helm && chmod +x ./helm
          rm -rf linux-${{ matrix.arch }} helm.tar.gz
          echo "✓ Helm 下载完成 (${HELM_VERSION})"

          # 下载 EdgeMesh Helm Chart
          mkdir -p helm-charts
          wget -q -O helm-charts/edgemesh.tgz \
            "https://raw.githubusercontent.com/kubeedge/edgemesh/main/build/helm/edgemesh.tgz" \
            || echo "⚠️  EdgeMesh chart 下载失败，跳过"



          # 4. 准备安装脚本和打包
          echo "[4/4] 准备安装脚本和打包..."
          INSTALL_SCRIPT="${GITHUB_WORKSPACE}/worker/install/install.sh"
          CLEANUP_SCRIPT="${GITHUB_WORKSPACE}/worker/install/cleanup.sh"
          if [ ! -f "$INSTALL_SCRIPT" ]; then
            echo "❌ 错误：找不到安装脚本 $INSTALL_SCRIPT"
            exit 1
          fi
          echo "✓ 安装脚本就绪"

          mkdir -p meta
          cat > meta/version.txt << EOFMETA
          k3s_version=${K3S_VERSION}
          arch=${{ matrix.arch }}
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          tag=${TAG_VERSION}
          EOFMETA
          echo "✓ 安装元数据已创建"

          # 打包
          PACKAGE_NAME="k3s-worker-${K3S_VERSION}-${{ matrix.arch }}-${TAG_VERSION}.tar.gz"
          TEMP_PKG_DIR="$(mktemp -d)"
          trap "rm -rf $TEMP_PKG_DIR" EXIT

          # 复制文件到临时目录
          cp "k3s-${{ matrix.arch }}" "$TEMP_PKG_DIR/"
          cp -r meta "$TEMP_PKG_DIR/"
          cp "$INSTALL_SCRIPT" "$TEMP_PKG_DIR/"
          [ -f "$CLEANUP_SCRIPT" ] && cp "$CLEANUP_SCRIPT" "$TEMP_PKG_DIR/" && echo "✓ 已包含 cleanup.sh"
          [ -f helm ] && cp helm "$TEMP_PKG_DIR/" && echo "✓ 已包含 Helm"
          [ -d images ] && cp -r images "$TEMP_PKG_DIR/" && echo "✓ 已包含 K3s 系统镜像"
          [ -d helm-charts ] && ls helm-charts/*.tgz &>/dev/null && cp -r helm-charts "$TEMP_PKG_DIR/" && echo "✓ 已包含 Helm Charts"
          [ -d nfs ] && ls nfs/*.deb &>/dev/null && cp -r nfs "$TEMP_PKG_DIR/" && echo "✓ 已包含 nfs-common 离线包"


          # 生成包内说明文件
          cat > "$TEMP_PKG_DIR/README.txt" << EOFREADME
          K3s Worker 节点离线安装包
          ========================

          版本信息:
            K3s: ${K3S_VERSION}
            架构: ${{ matrix.arch }}
            构建时间: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          使用方法:
            sudo ./install.sh <master-ip:port> <k3s-token> [node-name]

          示例:
            sudo ./install.sh 192.168.122.231:6443 K10xxx...::xxx:sh worker-01

          参数说明:
            master-ip:port  K3s master 节点地址和端口（端口默认 6443）
            k3s-token       K3s 加入令牌（在 master 节点执行：cat /var/lib/rancher/k3s/server/node-token）
            node-name       Worker 节点名称（可选，默认 k3s-worker-<hostname>）

          说明:
            安装脚本会自动为节点打上 node-role.kubernetes.io/worker=true 标签，
            kubectl get nodes 的 ROLES 列将显示 worker。

          清理/重装:
            sudo ./cleanup.sh

          验证:
            在 master 节点执行: kubectl get nodes

          详细文档: https://github.com/k3s-io/k3s
          EOFREADME

          # 打包
          tar -czf "$PACKAGE_NAME" -C "$TEMP_PKG_DIR" .
          echo "✓ 包已创建: $PACKAGE_NAME"
          echo "包大小: $(du -h "$PACKAGE_NAME" | cut -f1)"

      - name: 生成校验和并准备发布文件
        run: |
          PACKAGE_NAME="k3s-worker-${K3S_VERSION}-${{ matrix.arch }}-${TAG_VERSION}.tar.gz"
          sha256sum "$PACKAGE_NAME" > "${PACKAGE_NAME}.sha256sum.txt"

          mkdir -p "${GITHUB_WORKSPACE}/release-${{ matrix.arch }}"
          cp "$PACKAGE_NAME" "${GITHUB_WORKSPACE}/release-${{ matrix.arch }}/"
          cp "${PACKAGE_NAME}.sha256sum.txt" "${GITHUB_WORKSPACE}/release-${{ matrix.arch }}/"

          echo "=== 准备发布的文件 (${{ matrix.arch }}) ==="
          ls -lh "${GITHUB_WORKSPACE}/release-${{ matrix.arch }}/"

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.set_env.outputs.tag_version }}
          files: release-${{ matrix.arch }}/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
